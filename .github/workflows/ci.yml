name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run format -- --check || true

  test-backend-api:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: news_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/news_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key
      COOKIE_SECRET: ci-cookie-secret
      NODE_ENV: test
      PORT: 5000
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: test-media
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx drizzle-kit push
      - run: npx tsx src/seed.ts
      - name: Start server
        run: npx tsx src/index.ts &
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:5000/api/health && break || sleep 1
          done
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/backend/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-test-results
          path: test-results/

  test-e2e:
    runs-on: ubuntu-latest
    needs: test-backend-api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: news_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/news_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key
      COOKIE_SECRET: ci-cookie-secret
      NODE_ENV: test
      PORT: 5000
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx drizzle-kit push
      - run: npx tsx src/seed.ts
      - name: Start backend
        run: npx tsx src/index.ts &
      - name: Wait for backend
        run: for i in $(seq 1 30); do curl -s http://localhost:5000/api/health && break || sleep 1; done
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/admin/ tests/web/
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: dist/

  docker:
    runs-on: ubuntu-latest
    needs: [build, test-backend-api]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t news-backend:${{ github.sha }} .
      - name: Tag latest
        run: docker tag news-backend:${{ github.sha }} news-backend:latest
